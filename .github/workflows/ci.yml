name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run lint
        run: python -m ruff check edc_translation tests

      - name: Run tests
        env:
          PGCONNECT_TIMEOUT: "2"
        run: python -m pytest -q

  helm:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.19.0

      - name: Lint chart
        run: helm lint helm/edc-translation

      - name: Render default chart
        run: helm template edc-translation helm/edc-translation

      - name: Render staging chart
        run: helm template edc-translation helm/edc-translation -f helm/edc-translation/values-staging.yaml

      - name: Render production chart
        run: helm template edc-translation helm/edc-translation -f helm/edc-translation/values-production.yaml

  compose:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate compose files
        run: |
          docker compose -f docker-compose.local.yml config --quiet
          docker compose -f docker-compose.prod.yml config --quiet
