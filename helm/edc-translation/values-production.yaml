platform:
  production: true
  environment: production

replicaCount: 3

serviceAccount:
  create: true

auth:
  mode: jwt_ldap
  existingSecret: edc-translation-auth

secretManager:
  enabled: true
  provider: external-secrets
  secretStoreRef:
    kind: ClusterSecretStore
    name: edc-translation-production-secrets
  targetSecretName: edc-translation-auth

rbac:
  create: true

worker:
  enabled: true
  runtimeAdapterVerified: true
  replicaCount: 1
  queueBackend: kafka
  resources: {}

mcp:
  enabled: true
  runtimeHttpServerVerified: true
  replicaCount: 2

modelCache:
  enabled: true
  existingClaim: edc-translation-model-cache
  mountPath: /models

gpuProfile:
  selected: gpu-1x24
  profiles:
    gpu-1x24:
      ct2Device: cuda
      maxLoadedModels: 3
      nodeSelector:
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      resources:
        limits:
          nvidia.com/gpu: 1

translation:
  ct2:
    device: cuda
    localCt2OpusModelDir: /models/opus-mt
    localCt2NllbModelDir: /models/nllb
    localCt2MadladModelDir: /models/madlad

networkPolicy:
  enabled: true
  ingressNamespaceSelector:
    kubernetes.io/metadata.name: ingress-nginx
  monitoringNamespaceSelector:
    kubernetes.io/metadata.name: monitoring
  postgresPodSelectorLabels:
    cnpg.io/cluster: edc-translation-postgres
  kafkaPodSelectorLabels:
    strimzi.io/cluster: edc-translation-kafka

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: edc-translation-production
  hosts:
    - host: edc-translation.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: edc-translation-tls
      hosts:
        - edc-translation.example.com

keda:
  enabled: true
  minReplicaCount: 1
  maxReplicaCount: 8
  kafka:
    bootstrapServers: edc-translation-kafka-kafka-bootstrap.edc-translation.svc:9092
    topic: translation-segments
    consumerGroup: edc-translation-workers
    lagThreshold: "20"
  postgres:
    enabled: true

cnpg:
  enabled: true
  clusterName: edc-translation-postgres
  instances: 3
  storage:
    size: 200Gi
  pooler:
    enabled: true
    instances: 3
  backups:
    enabled: true
    immediate: true
    immediateName: edc-translation-postgres-manual
    schedule: "0 0 3 * * *"
    retentionPolicy: "30d"

strimzi:
  enabled: true
  clusterName: edc-translation-kafka
  replicas: 3
  minInSyncReplicas: 2
  storage:
    size: 500Gi
  zookeeper:
    replicas: 3
    storage:
      size: 20Gi
  topics:
    translation-jobs:
      partitions: 6
      replicas: 3
    translation-segments:
      partitions: 24
      replicas: 3
    translation-results:
      partitions: 24
      replicas: 3
    translation-dead-letter:
      partitions: 6
      replicas: 3
