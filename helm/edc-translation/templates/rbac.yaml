{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "edc-translation.fullname" . }}
  labels:
    {{- include "edc-translation.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "edc-translation.fullname" . }}
  labels:
    {{- include "edc-translation.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "edc-translation.serviceAccountName" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "edc-translation.fullname" . }}
{{- end }}
