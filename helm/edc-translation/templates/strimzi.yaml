{{- if .Values.strimzi.enabled }}
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: {{ .Values.strimzi.clusterName }}-pool
  labels:
    strimzi.io/cluster: {{ .Values.strimzi.clusterName }}
    {{- include "edc-translation.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka
spec:
  replicas: {{ .Values.strimzi.replicas }}
  roles:
    - controller
    - broker
  storage:
    type: persistent-claim
    size: {{ .Values.strimzi.storage.size | quote }}
    deleteClaim: false
    kraftMetadata: shared
    {{- if .Values.strimzi.storage.storageClass }}
    class: {{ .Values.strimzi.storage.storageClass | quote }}
    {{- end }}
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: {{ .Values.strimzi.clusterName }}
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
  labels:
    {{- include "edc-translation.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka
spec:
  kafka:
    version: {{ .Values.strimzi.version | quote }}
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: {{ .Values.strimzi.replicas }}
      transaction.state.log.replication.factor: {{ .Values.strimzi.replicas }}
      transaction.state.log.min.isr: {{ .Values.strimzi.minInSyncReplicas }}
      default.replication.factor: {{ .Values.strimzi.replicas }}
      min.insync.replicas: {{ .Values.strimzi.minInSyncReplicas }}
  entityOperator:
    topicOperator: {}
    userOperator: {}
{{- range $name, $topic := .Values.strimzi.topics }}
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: {{ $name }}
  labels:
    strimzi.io/cluster: {{ $.Values.strimzi.clusterName }}
    {{- include "edc-translation.labels" $ | nindent 4 }}
    app.kubernetes.io/component: kafka-topic
spec:
  partitions: {{ $topic.partitions }}
  replicas: {{ $topic.replicas }}
{{- end }}
{{- end }}
