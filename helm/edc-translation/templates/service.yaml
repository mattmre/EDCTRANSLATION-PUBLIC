apiVersion: v1
kind: Service
metadata:
  name: {{ include "edc-translation.fullname" . }}
  labels:
    {{- include "edc-translation.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "edc-translation.componentSelectorLabels" (dict "root" . "component" "api") | nindent 4 }}
