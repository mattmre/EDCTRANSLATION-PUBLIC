{{- if .Values.mcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edc-translation.fullname" . }}-mcp
  labels:
    {{- include "edc-translation.componentLabels" (dict "root" . "component" "mcp") | nindent 4 }}
spec:
  replicas: {{ .Values.mcp.replicaCount }}
  selector:
    matchLabels:
      {{- include "edc-translation.componentSelectorLabels" (dict "root" . "component" "mcp") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "edc-translation.componentSelectorLabels" (dict "root" . "component" "mcp") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "edc-translation.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- include "edc-translation.hostAliases" . | nindent 6 }}
      containers:
        - name: mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.mcp.command | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - containerPort: {{ .Values.mcp.service.port }}
              name: http
          env:
            - name: EDC_AUTH_MODE
              value: {{ .Values.auth.mode | quote }}
            - name: EDC_DEPLOYMENT_ENV
              value: {{ .Values.platform.environment | quote }}
            {{- if .Values.auth.existingSecret }}
            - name: EDC_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret | quote }}
                  key: {{ .Values.auth.jwtSecretKey | quote }}
            - name: EDC_LDAP_BIND_DN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret | quote }}
                  key: {{ .Values.auth.ldapBindDnKey | quote }}
            - name: EDC_LDAP_BIND_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret | quote }}
                  key: {{ .Values.auth.ldapBindPasswordKey | quote }}
            {{- end }}
            {{- if .Values.keda.postgres.enabled }}
            - name: EDC_TRANSLATION_JOB_BACKEND
              value: "postgres"
            - name: EDC_TRANSLATION_AUTH_STORE_BACKEND
              value: "postgres"
            - name: EDC_TRANSLATION_MODEL_REGISTRY_BACKEND
              value: "postgres"
            - name: EDC_TRANSLATION_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keda.postgres.connectionFromSecret | quote }}
                  key: {{ .Values.keda.postgres.connectionSecretKey | quote }}
            {{- end }}
            {{- include "edc-translation.localLlmEnv" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.mcp.resources | nindent 12 }}
{{- end }}
