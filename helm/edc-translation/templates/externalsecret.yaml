{{- if .Values.secretManager.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "edc-translation.fullname" . }}-auth
  labels:
    {{- include "edc-translation.labels" . | nindent 4 }}
    app.kubernetes.io/component: secret-manager
spec:
  refreshInterval: {{ .Values.secretManager.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.secretManager.secretStoreRef.kind | quote }}
    name: {{ required "secretManager.secretStoreRef.name is required when secretManager.enabled=true" .Values.secretManager.secretStoreRef.name | quote }}
  target:
    name: {{ default .Values.auth.existingSecret .Values.secretManager.targetSecretName | required "auth.existingSecret or secretManager.targetSecretName is required when secretManager.enabled=true" | quote }}
    creationPolicy: {{ .Values.secretManager.creationPolicy | quote }}
  data:
    - secretKey: {{ .Values.auth.jwtSecretKey | quote }}
      remoteRef:
        key: {{ .Values.secretManager.remoteRefs.jwtSecret.key | quote }}
        property: {{ .Values.secretManager.remoteRefs.jwtSecret.property | quote }}
    - secretKey: {{ .Values.auth.ldapBindDnKey | quote }}
      remoteRef:
        key: {{ .Values.secretManager.remoteRefs.ldapBindDn.key | quote }}
        property: {{ .Values.secretManager.remoteRefs.ldapBindDn.property | quote }}
    - secretKey: {{ .Values.auth.ldapBindPasswordKey | quote }}
      remoteRef:
        key: {{ .Values.secretManager.remoteRefs.ldapBindPassword.key | quote }}
        property: {{ .Values.secretManager.remoteRefs.ldapBindPassword.property | quote }}
{{- end }}
