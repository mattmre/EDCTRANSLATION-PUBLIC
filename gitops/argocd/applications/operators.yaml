apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: edc-translation-operators
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: edc-translation
  source:
    repoURL: https://example.com/edc-translation.git
    targetRevision: main
    path: gitops/operators
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
