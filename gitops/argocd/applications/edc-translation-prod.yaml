apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: edc-translation-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: edc-translation
  source:
    repoURL: https://example.com/edc-translation.git
    targetRevision: main
    path: helm/edc-translation
    helm:
      valueFiles:
        - values.yaml
        - values-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: edc-translation
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
