apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: edc-translation-platform
  namespace: argocd
spec:
  project: edc-translation
  source:
    repoURL: https://example.com/edc-translation.git
    targetRevision: main
    path: gitops/argocd/applications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
