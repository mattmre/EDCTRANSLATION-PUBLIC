name: edc-translation-local

services:
  api:
    build:
      context: .
    image: edc-translation:local
    command:
      - uvicorn
      - edc_translation.api:app
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    environment:
      EDC_AUTH_MODE: disabled
      EDC_TRANSLATION_JOB_STORE_DIR: /data/jobs
      EDC_TRANSLATION_LIVE_SMOKE: "1"
      EDC_TRANSLATION_LOCAL_LLM_BASE_URL: http://mock-llm:8082
      EDC_TRANSLATION_LOCAL_LLM_MODEL_IDS: mock-translation-smoke
    ports:
      - "127.0.0.1:18080:8080"
    volumes:
      - edc_translation_jobs:/data/jobs
    depends_on:
      mock-llm:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/readyz', timeout=2)"
      interval: 20s
      timeout: 5s
      retries: 6
    mem_limit: ${API_MEM_LIMIT:-512m}
    memswap_limit: ${API_MEMSWAP_LIMIT:-1024m}
    cpus: 1.0

  mcp:
    image: edc-translation:local
    command:
      - edc-translation-mcp-http
      - --host
      - 0.0.0.0
      - --port
      - "8081"
    environment:
      EDC_AUTH_MODE: disabled
      EDC_TRANSLATION_JOB_STORE_DIR: /data/jobs
      EDC_TRANSLATION_LIVE_SMOKE: "1"
      EDC_TRANSLATION_LOCAL_LLM_BASE_URL: http://mock-llm:8082
      EDC_TRANSLATION_LOCAL_LLM_MODEL_IDS: mock-translation-smoke
    ports:
      - "127.0.0.1:18081:8081"
    volumes:
      - edc_translation_jobs:/data/jobs
    depends_on:
      api:
        condition: service_healthy
      mock-llm:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/readyz', timeout=2)"
      interval: 20s
      timeout: 5s
      retries: 6
    mem_limit: ${MCP_MEM_LIMIT:-512m}
    memswap_limit: ${MCP_MEMSWAP_LIMIT:-1024m}
    cpus: 1.0

  mock-llm:
    image: edc-translation:local
    command:
      - uvicorn
      - edc_translation.mock_openai:app
      - --host
      - 0.0.0.0
      - --port
      - "8082"
    ports:
      - "127.0.0.1:18082:8082"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8082/healthz', timeout=2)"
      interval: 20s
      timeout: 5s
      retries: 6
    mem_limit: ${MOCK_LLM_MEM_LIMIT:-256m}
    memswap_limit: ${MOCK_LLM_MEMSWAP_LIMIT:-512m}
    cpus: 0.5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: edc_translation
      POSTGRES_USER: edc_translation
      POSTGRES_PASSWORD: edc_translation_local_only
    volumes:
      - edc_translation_postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U edc_translation -d edc_translation
      interval: 20s
      timeout: 5s
      retries: 6
    mem_limit: ${POSTGRES_MEM_LIMIT:-512m}
    memswap_limit: ${POSTGRES_MEMSWAP_LIMIT:-1024m}
    cpus: 1.0

  redpanda:
    image: redpandadata/redpanda:v24.3.3
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://127.0.0.1:19092
    ports:
      - "127.0.0.1:19092:19092"
    volumes:
      - edc_translation_redpanda:/var/lib/redpanda/data
    mem_limit: ${REDPANDA_MEM_LIMIT:-768m}
    memswap_limit: ${REDPANDA_MEMSWAP_LIMIT:-1536m}
    cpus: 1.0

volumes:
  edc_translation_jobs:
  edc_translation_postgres:
  edc_translation_redpanda:
